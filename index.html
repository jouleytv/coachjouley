<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach Jouley Predictions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f8;
    --card: #ffffff;
    --card-border: rgba(0,0,0,0.06);
    --card-shadow: 0 2px 16px rgba(0,0,0,0.06);
    --card-hover-shadow: 0 8px 32px rgba(0,0,0,0.10);
    --accent: #ff6b35;
    --accent2: #ffa62b;
    --accent-border: rgba(255,107,53,0.5);
    --select-bg: linear-gradient(135deg, rgba(255,107,53,0.08), rgba(255,166,43,0.08));
    --text: #1a1a2e;
    --text-mid: #555;
    --text-dim: #999;
    --text-muted: #bbb;
    --ou-bg: #f7f8fc;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .hero-bg {
    position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
    width: 1000px; height: 600px;
    background: radial-gradient(ellipse, rgba(102,126,234,0.12) 0%, rgba(118,75,162,0.06) 40%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .hero-bg2 {
    position: fixed; bottom: -200px; right: -100px;
    width: 600px; height: 500px;
    background: radial-gradient(ellipse, rgba(240,147,251,0.08) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .container {
    max-width: 740px; margin: 0 auto;
    padding: 48px 20px 80px; position: relative; z-index: 2;
  }
  .header { text-align: center; margin-bottom: 48px; animation: fadeDown .8s ease; }
  @keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
  .header-icon { font-size: 40px; margin-bottom: 12px; }
  .header h1 {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(36px, 9vw, 64px);
    font-weight: 700; letter-spacing: 6px;
    text-transform: uppercase; line-height: 1.05;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 60%, #f093fb 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .header-line {
    width: 60px; height: 3px;
    background: linear-gradient(90deg, #667eea, #f093fb);
    margin: 16px auto 0; border-radius: 2px;
  }
  .date-badge { text-align: center; margin-bottom: 32px; animation: fadeDown .8s ease .2s backwards; }
  .date-badge span {
    display: inline-block; font-size: 12px; letter-spacing: 3px;
    color: #764ba2; font-weight: 600; text-transform: uppercase;
    padding: 8px 24px; border: 1px solid rgba(118,75,162,0.2);
    border-radius: 30px; background: rgba(118,75,162,0.04);
  }
  .games { display:flex; flex-direction:column; gap:16px; }
  .game-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 20px; padding: 24px 28px;
    box-shadow: var(--card-shadow); transition: all .3s ease;
    animation: cardIn .6s ease backwards;
  }
  .game-card:nth-child(1){animation-delay:.1s} .game-card:nth-child(2){animation-delay:.16s}
  .game-card:nth-child(3){animation-delay:.22s} .game-card:nth-child(4){animation-delay:.28s}
  .game-card:nth-child(5){animation-delay:.34s} .game-card:nth-child(6){animation-delay:.4s}
  .game-card:nth-child(7){animation-delay:.46s} .game-card:nth-child(8){animation-delay:.52s}
  .game-card:nth-child(9){animation-delay:.58s}
  @keyframes cardIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .game-card:hover { box-shadow: var(--card-hover-shadow); transform: translateY(-2px); }

  .game-meta {
    display: flex; justify-content: flex-end; align-items: center; margin-bottom: 14px;
  }
  .game-time { font-size: 11px; letter-spacing: 1px; color: var(--text-muted); }

  .matchup { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:18px; }
  .team-pick {
    flex:1; display:flex; flex-direction:column; align-items:center; gap:8px;
    padding: 14px 8px; border-radius: 16px; cursor:pointer;
    border: 2px solid transparent; transition: all .25s ease;
    position: relative; overflow: hidden;
  }
  .team-pick:hover { background: rgba(118,75,162,0.04); }
  .team-pick.selected { border-color: var(--accent-border); background: var(--select-bg); }
  .team-pick.selected .team-star { display:block; }
  .team-star { display: none; position: absolute; top:6px; right:8px; font-size: 16px; color: var(--accent); z-index:2; }
  .team-logo {
    width:64px; height:64px; display:flex; align-items:center; justify-content:center;
    position:relative; z-index:1; transition: transform .3s ease; flex-shrink:0;
  }
  .team-logo svg { width:60px; height:60px; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.15)); }
  .team-pick:hover .team-logo { transform:scale(1.06); }
  .team-city { font-size:10px; letter-spacing:1.5px; color:var(--text-dim); text-transform:uppercase; }
  .team-name {
    font-family:'Oswald',sans-serif; font-size:16px; font-weight:700;
    letter-spacing:3px; color:var(--text); text-transform:uppercase;
  }
  .team-prob {
    font-size: 11px; color: #764ba2; letter-spacing: 1px; font-weight: 600;
    background: rgba(118,75,162,0.08); padding: 2px 8px; border-radius: 6px;
  }
  .vs {
    font-family:'Oswald',sans-serif; font-size:13px; font-weight:700;
    color:var(--text-muted); letter-spacing:4px; flex-shrink:0;
  }
  .ou-bar {
    display:flex; align-items:center; gap:10px;
    background: var(--ou-bg); border-radius: 12px; padding: 10px 14px;
    border: 1px solid rgba(0,0,0,0.04);
  }
  .ou-label { font-size:10px; letter-spacing:2px; color:var(--text-muted); flex-shrink:0; font-weight:600; }
  .ou-input {
    width:80px; padding:7px 10px; border-radius:8px;
    border:1px solid rgba(0,0,0,0.1); background:#fff; color:var(--text);
    font-size:13px; font-family:'DM Sans',sans-serif; text-align:center;
    outline:none; transition: border-color .2s;
  }
  .ou-input:focus { border-color: #764ba2; }
  .ou-input::placeholder { color: #ccc; }
  .ou-btns { display:flex; gap:6px; margin-left:auto; }
  .ou-btn {
    padding:7px 18px; border-radius:8px; border:2px solid transparent;
    cursor:pointer; font-size:11px; font-weight:700; letter-spacing:1.5px;
    font-family:'DM Sans',sans-serif; text-transform:uppercase;
    background: rgba(0,0,0,0.03); color:var(--text-dim); transition: all .2s ease;
  }
  .ou-btn:hover { background: rgba(0,0,0,0.06); color: var(--text-mid); }
  .ou-btn.sel {
    border-color: var(--accent-border);
    background: linear-gradient(135deg, rgba(255,107,53,0.08), rgba(255,166,43,0.08));
    color: var(--accent);
  }
  .footer {
    text-align:center; margin-top:56px;
    font-size:11px; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase;
  }
  @media(max-width:520px) {
    .container{padding:32px 12px 60px} .game-card{padding:18px 14px}
    .team-logo{width:50px;height:50px} .team-logo svg{width:46px;height:46px}
    .team-name{font-size:13px;letter-spacing:2px}
    .ou-bar{flex-wrap:wrap;gap:8px} .ou-btns{margin-left:0;width:100%;justify-content:center}
    .ou-input{flex:1;width:auto}
  }
</style>
</head>

  {id:"g1",home:"WAS",away:"PHI",time:"2026-04-01T23:00:00Z",prob:{WAS:9.2,PHI:90.8}},
  {id:"g2",home:"ORL",away:"ATL",time:"2026-04-01T23:00:00Z",prob:{ORL:43.4,ATL:56.6}},
  {id:"g3",home:"MIA",away:"BOS",time:"2026-04-01T23:30:00Z",prob:{MIA:37.1,BOS:62.9}},
  {id:"g4",home:"CHI",away:"IND",time:"2026-04-02T00:00:00Z",prob:{CHI:61.5,IND:38.5}},
  {id:"g5",home:"HOU",away:"MIL",time:"2026-04-02T00:00:00Z",prob:{HOU:94,MIL:6}},
  {id:"g6",home:"TOR",away:"SAC",time:"2026-04-02T00:00:00Z",prob:{TOR:84.8,SAC:15.2}},
  {id:"g7",home:"MEM",away:"NYK",time:"2026-04-02T00:00:00Z",prob:{MEM:10.8,NYK:89.2}},
  {id:"g8",home:"UTA",away:"DEN",time:"2026-04-02T01:00:00Z",prob:{UTA:6.9,DEN:93.1}},
  {id:"g9",home:"GSW",away:"SAS",time:"2026-04-02T02:00:00Z",prob:{GSW:12.1,SAS:87.9}}
];

var TI = {
  ATL:{name:"Hawks",city:"Atlanta"},BOS:{name:"Celtics",city:"Boston"},
  CHI:{name:"Bulls",city:"Chicago"},DEN:{name:"Nuggets",city:"Denver"},
  GSW:{name:"Warriors",city:"Golden State"},HOU:{name:"Rockets",city:"Houston"},
  IND:{name:"Pacers",city:"Indiana"},MEM:{name:"Grizzlies",city:"Memphis"},
  MIA:{name:"Heat",city:"Miami"},MIL:{name:"Bucks",city:"Milwaukee"},
  NYK:{name:"Knicks",city:"New York"},ORL:{name:"Magic",city:"Orlando"},
  PHI:{name:"76ers",city:"Philadelphia"},SAC:{name:"Kings",city:"Sacramento"},
  SAS:{name:"Spurs",city:"San Antonio"},TOR:{name:"Raptors",city:"Toronto"},
  UTA:{name:"Jazz",city:"Utah"},WAS:{name:"Wizards",city:"Washington"}
};

var SK = "cj-pred-v7";
var picks = {};
try { picks = JSON.parse(localStorage.getItem(SK)) || {}; } catch(e) {}
function save() { try { localStorage.setItem(SK, JSON.stringify(picks)); } catch(e) {} }

function selW(gid, team) {
  if (!picks[gid]) picks[gid] = {};
  picks[gid].winner = (picks[gid].winner === team) ? null : team;
  save(); render();
}
function selOU(gid, val) {
  if (!picks[gid]) picks[gid] = {};
  picks[gid].ou = (picks[gid].ou === val) ? null : val;
  save(); render();
}
function setL(gid, val) {
  if (!picks[gid]) picks[gid] = {};
  picks[gid].line = val; save();
}

function getTime(iso) {
  return new Date(iso).toLocaleTimeString("de-DE", {hour:"2-digit", minute:"2-digit", timeZoneName:"short"});
}

function makeCard(g) {
  var p = picks[g.id] || {};
  var a = TI[g.away], h = TI[g.home];
  var awSel = (p.winner === g.away) ? " selected" : "";
  var hmSel = (p.winner === g.home) ? " selected" : "";
  var ovSel = (p.ou === "over") ? " sel" : "";
  var unSel = (p.ou === "under") ? " sel" : "";
  var awProb = (g.prob[g.away] != null) ? '<span class="team-prob">' + g.prob[g.away] + '%</span>' : "";
  var hmProb = (g.prob[g.home] != null) ? '<span class="team-prob">' + g.prob[g.home] + '%</span>' : "";

  return '<div class="game-card">' +
    '<div class="game-meta">' +
      '<span class="game-time">' + getTime(g.time) + '</span>' +
    '</div>' +
    '<div class="matchup">' +
      '<div class="team-pick' + awSel + '" onclick="selW(\'' + g.id + '\',\'' + g.away + '\')">' +
        '<span class="team-star">\u2605</span>' +
        '<div class="team-logo">' + (SVGS[g.away] || "") + '</div>' +
        '<span class="team-city">' + a.city + '</span>' +
        '<span class="team-name">' + a.name + '</span>' +
        awProb +
      '</div>' +
      '<span class="vs">VS</span>' +
      '<div class="team-pick' + hmSel + '" onclick="selW(\'' + g.id + '\',\'' + g.home + '\')">' +
        '<span class="team-star">\u2605</span>' +
        '<div class="team-logo">' + (SVGS[g.home] || "") + '</div>' +
        '<span class="team-city">' + h.city + '</span>' +
        '<span class="team-name">' + h.name + '</span>' +
        hmProb +
      '</div>' +
    '</div>' +
    '<div class="ou-bar">' +
      '<span class="ou-label">O/U</span>' +
      '<input class="ou-input" type="number" step="0.5" placeholder="215.5" value="' + (p.line||"") + '" oninput="setL(\'' + g.id + '\',this.value)">' +
      '<div class="ou-btns">' +
        '<button class="ou-btn' + ovSel + '" onclick="selOU(\'' + g.id + '\',\'over\')">OVER \u2191</button>' +
        '<button class="ou-btn' + unSel + '" onclick="selOU(\'' + g.id + '\',\'under\')">UNDER \u2193</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function render() {
  var el = document.getElementById("games");
  var html = "";
  for (var i = 0; i < GAMES.length; i++) html += makeCard(GAMES[i]);
  el.innerHTML = html;
}
render();
</script>

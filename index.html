<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach Jouley Predictions · NBA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06080c;
    --card: rgba(255,255,255,0.025);
    --card-border: rgba(255,255,255,0.06);
    --card-hover: rgba(255,255,255,0.05);
    --gold: #f5c542;
    --gold-glow: rgba(245,197,66,0.18);
    --gold-border: rgba(245,197,66,0.55);
    --gold-soft: rgba(245,197,66,0.10);
    --over-green: #4ade80;
    --under-red: #f87171;
    --text: #ececec;
    --text-dim: #6a6a6a;
    --text-muted: #3a3a3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { background: var(--bg); }

  body {
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 1;
  }

  /* Ambient glow */
  body::after {
    content: '';
    position: fixed; top: -40%; left: 50%; transform: translateX(-50%);
    width: 900px; height: 700px;
    background: radial-gradient(circle, var(--gold-glow) 0%, transparent 65%);
    pointer-events: none; z-index: 0;
    filter: blur(60px);
  }

  .wrap {
    position: relative; z-index: 2;
    max-width: 1100px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 64px;
    animation: fadeUp 0.8s ease both;
  }

  .brand-mark {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 8px 16px;
    border: 1px solid var(--gold-border);
    border-radius: 999px;
    background: var(--gold-soft);
  }
  .brand-mark::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 10px var(--gold);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: clamp(40px, 7vw, 78px);
    letter-spacing: 0.02em;
    line-height: 0.95;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  h1 .accent { color: var(--gold); }

  .sub {
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .sub .dot { color: var(--gold); margin: 0 10px; }

  /* Game grid */
  .games {
    display: grid;
    gap: 28px;
  }

  .game {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 28px;
    transition: border-color 0.25s ease, background 0.25s ease;
    animation: fadeUp 0.7s ease both;
    position: relative;
    overflow: hidden;
  }
  .game:nth-child(1) { animation-delay: 0.1s; }
  .game:nth-child(2) { animation-delay: 0.2s; }
  .game:nth-child(3) { animation-delay: 0.3s; }
  .game:nth-child(4) { animation-delay: 0.4s; }

  .game:hover {
    background: var(--card-hover);
    border-color: rgba(255,255,255,0.1);
  }

  .game-meta {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 22px;
    padding-bottom: 18px;
    border-bottom: 1px dashed rgba(255,255,255,0.05);
  }
  .series { color: var(--gold); }
  .tipoff { color: var(--text); font-weight: 500; }

  /* Teams */
  .teams {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 18px;
    margin-bottom: 26px;
  }

  .team {
    display: flex; flex-direction: column; align-items: center;
    gap: 14px;
    padding: 22px 16px;
    border-radius: 12px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.25s ease;
    position: relative;
  }
  .team:hover { background: rgba(255,255,255,0.03); }

  .team.selected {
    background: var(--gold-soft);
    border-color: var(--gold-border);
    box-shadow: 0 0 32px -8px var(--gold-glow);
  }
  .team.selected::after {
    content: '★ PICK';
    position: absolute; top: 8px; right: 10px;
    font-size: 9px; letter-spacing: 0.2em;
    color: var(--gold); font-weight: 700;
  }

  .logo {
    width: 72px; height: 72px;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.25s ease;
  }
  .team:hover .logo { transform: scale(1.06); }
  .logo img { max-width: 100%; max-height: 100%; object-fit: contain; }

  .team-name {
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-align: center;
  }
  .team-loc {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .vs {
    font-family: 'Oswald', sans-serif;
    font-size: 22px; font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  /* Bet sections */
  .bet-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 18px;
  }

  .bet-section {
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 16px;
  }

  .bet-label {
    font-size: 10px;
    letter-spacing: 0.28em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .bet-label::before {
    content: ''; width: 4px; height: 4px; background: var(--gold); border-radius: 50%;
  }

  .line-input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    padding: 10px 12px;
    border-radius: 6px;
    margin-bottom: 10px;
    transition: border-color 0.2s ease;
  }
  .line-input:focus {
    outline: none;
    border-color: var(--gold-border);
  }
  .line-input::placeholder { color: var(--text-muted); }

  .pick-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .pick-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-dim);
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.15em;
    padding: 10px 8px;
    border-radius: 6px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s ease;
  }
  .pick-btn:hover {
    border-color: rgba(255,255,255,0.2);
    color: var(--text);
  }
  .pick-btn.active {
    background: var(--gold-soft);
    border-color: var(--gold-border);
    color: var(--gold);
    box-shadow: 0 0 18px -6px var(--gold-glow);
  }

  /* Reset */
  .reset-row {
    text-align: center;
    margin-top: 48px;
  }
  .reset-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    padding: 12px 28px;
    border-radius: 999px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s ease;
  }
  .reset-btn:hover {
    border-color: var(--gold-border);
    color: var(--gold);
  }

  footer {
    text-align: center;
    margin-top: 48px;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 640px) {
    .wrap { padding: 40px 16px 60px; }
    .game { padding: 22px 18px; }
    .teams { gap: 8px; }
    .logo { width: 58px; height: 58px; }
    .team-name { font-size: 15px; }
    .bet-row { grid-template-columns: 1fr; }
    .game-meta { font-size: 9px; flex-direction: column; gap: 6px; align-items: flex-start; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand-mark">Live · NBA Playoffs</div>
      <h1>Coach Jouley<br><span class="accent">Predictions</span></h1>
      <div class="sub">Saturday Apr 26 <span class="dot">●</span> 4 Games <span class="dot">●</span> First Round</div>
    </header>

    <div class="games" id="games"></div>

    <div class="reset-row">
      <button class="reset-btn" id="resetBtn">↻ Reset all picks</button>
    </div>

    <footer>Coach Jouley · 2026 NBA Playoffs</footer>
  </div>

<script>
  const GAMES = [
    {
      id: 'orl-det-g3',
      series: 'East · ORL leads 1-1 · Game 3',
      tipoff: '19:00 CEST',
      home: { code: 'ORL', name: 'Magic', loc: 'Orlando' },
      away: { code: 'DET', name: 'Pistons', loc: 'Detroit' }
    },
    {
      id: 'phx-okc-g3',
      series: 'West · OKC leads 2-0 · Game 3',
      tipoff: '21:30 CEST',
      home: { code: 'PHX', name: 'Suns', loc: 'Phoenix' },
      away: { code: 'OKC', name: 'Thunder', loc: 'Oklahoma City' }
    },
    {
      id: 'atl-nyk-g4',
      series: 'East · ATL leads 2-1 · Game 4',
      tipoff: '00:00 CEST',
      home: { code: 'ATL', name: 'Hawks', loc: 'Atlanta' },
      away: { code: 'NYK', name: 'Knicks', loc: 'New York' }
    },
    {
      id: 'min-den-g4',
      series: 'West · MIN leads 2-1 · Game 4',
      tipoff: '02:30 CEST',
      home: { code: 'MIN', name: 'Timberwolves', loc: 'Minnesota' },
      away: { code: 'DEN', name: 'Nuggets', loc: 'Denver' }
    }
  ];

  const LOGO = {
    ATL: 'https://a.espncdn.com/i/teamlogos/nba/500/atl.png',
    BOS: 'https://a.espncdn.com/i/teamlogos/nba/500/bos.png',
    BKN: 'https://a.espncdn.com/i/teamlogos/nba/500/bkn.png',
    CHA: 'https://a.espncdn.com/i/teamlogos/nba/500/cha.png',
    CHI: 'https://a.espncdn.com/i/teamlogos/nba/500/chi.png',
    CLE: 'https://a.espncdn.com/i/teamlogos/nba/500/cle.png',
    DAL: 'https://a.espncdn.com/i/teamlogos/nba/500/dal.png',
    DEN: 'https://a.espncdn.com/i/teamlogos/nba/500/den.png',
    DET: 'https://a.espncdn.com/i/teamlogos/nba/500/det.png',
    GSW: 'https://a.espncdn.com/i/teamlogos/nba/500/gs.png',
    HOU: 'https://a.espncdn.com/i/teamlogos/nba/500/hou.png',
    IND: 'https://a.espncdn.com/i/teamlogos/nba/500/ind.png',
    LAC: 'https://a.espncdn.com/i/teamlogos/nba/500/lac.png',
    LAL: 'https://a.espncdn.com/i/teamlogos/nba/500/lal.png',
    MEM: 'https://a.espncdn.com/i/teamlogos/nba/500/mem.png',
    MIA: 'https://a.espncdn.com/i/teamlogos/nba/500/mia.png',
    MIL: 'https://a.espncdn.com/i/teamlogos/nba/500/mil.png',
    MIN: 'https://a.espncdn.com/i/teamlogos/nba/500/min.png',
    NOP: 'https://a.espncdn.com/i/teamlogos/nba/500/no.png',
    NYK: 'https://a.espncdn.com/i/teamlogos/nba/500/ny.png',
    OKC: 'https://a.espncdn.com/i/teamlogos/nba/500/okc.png',
    ORL: 'https://a.espncdn.com/i/teamlogos/nba/500/orl.png',
    PHI: 'https://a.espncdn.com/i/teamlogos/nba/500/phi.png',
    PHX: 'https://a.espncdn.com/i/teamlogos/nba/500/phx.png',
    POR: 'https://a.espncdn.com/i/teamlogos/nba/500/por.png',
    SAC: 'https://a.espncdn.com/i/teamlogos/nba/500/sac.png',
    SAS: 'https://a.espncdn.com/i/teamlogos/nba/500/sa.png',
    TOR: 'https://a.espncdn.com/i/teamlogos/nba/500/tor.png',
    UTA: 'https://a.espncdn.com/i/teamlogos/nba/500/utah.png',
    WAS: 'https://a.espncdn.com/i/teamlogos/nba/500/wsh.png'
  };

  const STORAGE_KEY = 'coachJouleyNBAPicks_2026_04_25';
  let picks = {};
  try { picks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { picks = {}; }
  function savePicks() { localStorage.setItem(STORAGE_KEY, JSON.stringify(picks)); }

  const container = document.getElementById('games');

  GAMES.forEach(g => {
    const card = document.createElement('div');
    card.className = 'game';
    card.dataset.game = g.id;
    card.innerHTML = `
      <div class="game-meta">
        <span class="series">${g.series}</span>
        <span class="tipoff">${g.tipoff}</span>
      </div>
      <div class="teams">
        <div class="team" data-team="${g.away.code}">
          <div class="logo"><img src="${LOGO[g.away.code]}" alt="${g.away.name}"></div>
          <div class="team-name">${g.away.name}</div>
          <div class="team-loc">${g.away.loc} · Away</div>
        </div>
        <div class="vs">@</div>
        <div class="team" data-team="${g.home.code}">
          <div class="logo"><img src="${LOGO[g.home.code]}" alt="${g.home.name}"></div>
          <div class="team-name">${g.home.name}</div>
          <div class="team-loc">${g.home.loc} · Home</div>
        </div>
      </div>
      <div class="bet-row">
        <div class="bet-section">
          <div class="bet-label">Over / Under</div>
          <input class="line-input" type="text" inputmode="decimal" placeholder="z.B. 215.5" data-field="ouLine">
          <div class="pick-btns">
            <button class="pick-btn" data-field="ou" data-value="over">Over ↑</button>
            <button class="pick-btn" data-field="ou" data-value="under">Under ↓</button>
          </div>
        </div>
        <div class="bet-section">
          <div class="bet-label">Handicap</div>
          <input class="line-input" type="text" inputmode="text" placeholder="z.B. -4.5 / +4.5" data-field="hcpLine">
          <div class="pick-btns">
            <button class="pick-btn" data-field="hcp" data-value="${g.away.code}">${g.away.code}</button>
            <button class="pick-btn" data-field="hcp" data-value="${g.home.code}">${g.home.code}</button>
          </div>
        </div>
      </div>
    `;
    container.appendChild(card);
  });

  function applyState() {
    document.querySelectorAll('.game').forEach(card => {
      const gid = card.dataset.game;
      const data = picks[gid] || {};
      card.querySelectorAll('.team').forEach(t => {
        t.classList.toggle('selected', data.winner === t.dataset.team);
      });
      card.querySelectorAll('.line-input').forEach(inp => {
        inp.value = data[inp.dataset.field] || '';
      });
      card.querySelectorAll('.pick-btn').forEach(btn => {
        btn.classList.toggle('active', data[btn.dataset.field] === btn.dataset.value);
      });
    });
  }

  document.querySelectorAll('.team').forEach(t => {
    t.addEventListener('click', () => {
      const card = t.closest('.game');
      const gid = card.dataset.game;
      if (!picks[gid]) picks[gid] = {};
      picks[gid].winner = picks[gid].winner === t.dataset.team ? null : t.dataset.team;
      savePicks(); applyState();
    });
  });

  document.querySelectorAll('.pick-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const card = btn.closest('.game');
      const gid = card.dataset.game;
      const f = btn.dataset.field;
      if (!picks[gid]) picks[gid] = {};
      picks[gid][f] = picks[gid][f] === btn.dataset.value ? null : btn.dataset.value;
      savePicks(); applyState();
    });
  });

  document.querySelectorAll('.line-input').forEach(inp => {
    inp.addEventListener('input', () => {
      const card = inp.closest('.game');
      const gid = card.dataset.game;
      if (!picks[gid]) picks[gid] = {};
      picks[gid][inp.dataset.field] = inp.value;
      savePicks();
    });
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    if (confirm('Wirklich alle Picks zurücksetzen?')) {
      picks = {};
      localStorage.removeItem(STORAGE_KEY);
      applyState();
    }
  });

  applyState();
</script>
</body>
</html>

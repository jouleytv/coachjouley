<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach Jouley Predictions — NBA Playoffs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06080c;
    --card: rgba(255,255,255,0.025);
    --card-border: rgba(255,255,255,0.06);
    --card-hover: rgba(255,255,255,0.05);
    --gold: #f5c542;
    --gold-glow: rgba(245,197,66,0.18);
    --gold-border: rgba(245,197,66,0.55);
    --gold-soft: rgba(245,197,66,0.08);
    --text: #e8e8e8;
    --text-dim: #777;
    --text-muted: #3a3a3a;
    --input-bg: rgba(255,255,255,0.02);
    --input-border: rgba(255,255,255,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh; overflow-x: hidden; position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 1;
  }
  body::after {
    content: ''; position: fixed; top: -40%; left: 50%; transform: translateX(-50%);
    width: 800px; height: 600px;
    background: radial-gradient(ellipse, var(--gold-glow) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .container {
    position: relative; z-index: 2;
    max-width: 1100px; margin: 0 auto;
    padding: 60px 24px 80px;
  }
  .hero { text-align: center; margin-bottom: 60px; }
  .hero-label {
    font-size: 11px; letter-spacing: 0.4em;
    text-transform: uppercase; color: var(--gold);
    margin-bottom: 18px; opacity: 0.85;
  }
  .hero h1 {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(40px, 7vw, 80px);
    font-weight: 700; letter-spacing: -0.01em;
    text-transform: uppercase; line-height: 0.95;
    margin-bottom: 14px;
  }
  .hero-sub {
    font-size: 11px; letter-spacing: 0.25em;
    color: var(--text-dim); text-transform: uppercase;
  }
  .hero-divider {
    width: 60px; height: 2px; background: var(--gold);
    margin: 26px auto 0; opacity: 0.7;
  }
  .game {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 4px;
    margin-bottom: 32px; padding: 32px;
    transition: border-color 0.2s ease;
  }
  .game:hover { border-color: rgba(255,255,255,0.1); }
  .game-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 28px; padding-bottom: 16px;
    border-bottom: 1px solid var(--card-border);
    flex-wrap: wrap; gap: 8px;
  }
  .game-tag {
    font-size: 10px; letter-spacing: 0.3em;
    color: var(--gold); text-transform: uppercase; font-weight: 600;
  }
  .game-time {
    font-size: 11px; letter-spacing: 0.15em;
    color: var(--text-dim); text-transform: uppercase;
  }
  .teams {
    display: grid; grid-template-columns: 1fr auto 1fr;
    gap: 18px; align-items: center; margin-bottom: 36px;
  }
  .team {
    position: relative;
    background: rgba(255,255,255,0.015);
    border: 1px solid var(--card-border);
    border-radius: 4px;
    padding: 28px 16px; cursor: pointer;
    transition: all 0.2s ease;
    text-align: center; overflow: hidden;
  }
  .team::after {
    content: ''; position: absolute; inset: 0;
    background: var(--gold-soft);
    opacity: 0; transition: opacity 0.2s ease;
    pointer-events: none;
  }
  .team:hover {
    border-color: rgba(245,197,66,0.25);
    background: var(--card-hover);
  }
  .team.selected {
    border-color: var(--gold-border);
    box-shadow: 0 0 0 1px var(--gold-border), 0 0 24px var(--gold-glow);
  }
  .team.selected::after { opacity: 1; }
  .team-logo {
    width: 80px; height: 80px;
    margin: 0 auto 14px; object-fit: contain;
    position: relative; z-index: 1;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
  }
  .team-name {
    font-family: 'Oswald', sans-serif;
    font-size: 18px; text-transform: uppercase;
    letter-spacing: 0.05em; font-weight: 600;
    position: relative; z-index: 1;
  }
  .team-loc {
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.2em; text-transform: uppercase;
    margin-top: 4px; position: relative; z-index: 1;
  }
  .vs {
    font-family: 'Oswald', sans-serif;
    font-size: 18px; color: var(--gold);
    font-weight: 700; letter-spacing: 0.1em; padding: 0 4px;
  }
  .bet-section { display: grid; gap: 16px; }
  .bet-row {
    display: grid; grid-template-columns: 130px 1fr;
    align-items: center; gap: 16px;
  }
  .bet-label {
    font-size: 10px; letter-spacing: 0.25em;
    color: var(--text-dim); text-transform: uppercase; font-weight: 600;
  }
  .bet-controls {
    display: flex; gap: 8px;
    align-items: center; flex-wrap: wrap;
  }
  .line-input {
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; padding: 10px 12px;
    border-radius: 3px; width: 90px;
    text-align: center;
    transition: all 0.15s ease;
    -moz-appearance: textfield;
  }
  .line-input::-webkit-outer-spin-button,
  .line-input::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  .line-input:focus {
    outline: none;
    border-color: var(--gold-border);
    background: rgba(245,197,66,0.04);
  }
  .line-input::placeholder { color: var(--text-muted); }
  .pick-btn {
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 10px 16px; border-radius: 3px;
    cursor: pointer; transition: all 0.15s ease;
    font-weight: 600;
  }
  .pick-btn:hover {
    border-color: rgba(245,197,66,0.3);
    color: var(--text);
  }
  .pick-btn.active {
    background: var(--gold-soft);
    border-color: var(--gold-border);
    color: var(--gold);
    box-shadow: 0 0 16px var(--gold-glow);
  }
  .actions {
    display: flex; justify-content: center;
    gap: 14px; margin-top: 50px;
  }
  .reset-btn {
    background: transparent;
    border: 1px solid var(--card-border);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 12px 24px; border-radius: 3px;
    cursor: pointer; transition: all 0.15s ease;
  }
  .reset-btn:hover {
    border-color: rgba(245,80,80,0.4);
    color: #f87171;
  }
  .footer {
    text-align: center; margin-top: 60px;
    font-size: 10px; letter-spacing: 0.25em;
    color: var(--text-muted); text-transform: uppercase;
  }
  .footer .gold-dot { color: var(--gold); margin: 0 8px; }
  @media (max-width: 600px) {
    .container { padding: 40px 16px 60px; }
    .game { padding: 22px 18px; }
    .teams { gap: 10px; }
    .team { padding: 20px 8px; }
    .team-logo { width: 60px; height: 60px; }
    .team-name { font-size: 14px; }
    .vs { font-size: 14px; }
    .bet-row { grid-template-columns: 1fr; gap: 8px; }
    .bet-label { font-size: 9px; }
    .pick-btn { font-size: 10px; padding: 9px 12px; }
    .line-input { width: 80px; font-size: 12px; }
  }
</style>
</head>
<body>
<div class="container">

  <header class="hero">
    <div class="hero-label">Coach Jouley</div>
    <h1>Predictions</h1>
    <div class="hero-sub">NBA Playoffs · Round 1 · Game 2</div>
    <div class="hero-divider"></div>
  </header>

  <!-- GAME 1: Pistons vs Magic -->
  <article class="game" data-game="g1">
    <div class="game-header">
      <span class="game-tag">East · First Round · G2</span>
      <span class="game-time">Apr 22 · Detroit</span>
    </div>

    <div class="teams">
      <div class="team" data-team="DET">
        <svg class="team-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="45" fill="#1d428a"/>
          <circle cx="50" cy="50" r="38" fill="#c8102e"/>
          <text x="50" y="62" text-anchor="middle" font-family="Oswald, sans-serif" font-weight="700" font-size="32" fill="#fff">DET</text>
        </svg>
        <div class="team-name">Pistons</div>
        <div class="team-loc">Detroit</div>
      </div>

      <div class="vs">VS</div>

      <div class="team" data-team="ORL">
        <svg class="team-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="45" fill="#0077c0"/>
          <text x="50" y="62" text-anchor="middle" font-family="Oswald, sans-serif" font-weight="700" font-size="32" fill="#c4ced4">ORL</text>
          <circle cx="50" cy="50" r="45" fill="none" stroke="#000" stroke-width="2"/>
        </svg>
        <div class="team-name">Magic</div>
        <div class="team-loc">Orlando</div>
      </div>
    </div>

    <div class="bet-section">
      <div class="bet-row">
        <div class="bet-label">Over / Under</div>
        <div class="bet-controls">
          <input type="number" step="0.5" class="line-input" data-field="ou-line" placeholder="—">
          <button class="pick-btn" data-field="ou-pick" data-value="OVER">Over</button>
          <button class="pick-btn" data-field="ou-pick" data-value="UNDER">Under</button>
        </div>
      </div>

      <div class="bet-row">
        <div class="bet-label">Handicap</div>
        <div class="bet-controls">
          <button class="pick-btn" data-field="hc-pick" data-value="DET">Pistons</button>
          <input type="number" step="0.5" class="line-input" data-field="hc-line" placeholder="±">
          <button class="pick-btn" data-field="hc-pick" data-value="ORL">Magic</button>
        </div>
      </div>
    </div>
  </article>

  <!-- GAME 2: Thunder vs Suns -->
  <article class="game" data-game="g2">
    <div class="game-header">
      <span class="game-tag">West · First Round · G2</span>
      <span class="game-time">Apr 22 · Oklahoma City</span>
    </div>

    <div class="teams">
      <div class="team" data-team="OKC">
        <svg class="team-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="45" fill="#007ac1"/>
          <text x="50" y="62" text-anchor="middle" font-family="Oswald, sans-serif" font-weight="700" font-size="30" fill="#ef3b24">OKC</text>
          <circle cx="50" cy="50" r="45" fill="none" stroke="#fdbb30" stroke-width="3"/>
        </svg>
        <div class="team-name">Thunder</div>
        <div class="team-loc">Oklahoma City</div>
      </div>

      <div class="vs">VS</div>

      <div class="team" data-team="PHX">
        <svg class="team-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="45" fill="#1d1160"/>
          <text x="50" y="62" text-anchor="middle" font-family="Oswald, sans-serif" font-weight="700" font-size="30" fill="#e56020">PHX</text>
          <circle cx="50" cy="50" r="45" fill="none" stroke="#e56020" stroke-width="3"/>
        </svg>
        <div class="team-name">Suns</div>
        <div class="team-loc">Phoenix</div>
      </div>
    </div>

    <div class="bet-section">
      <div class="bet-row">
        <div class="bet-label">Over / Under</div>
        <div class="bet-controls">
          <input type="number" step="0.5" class="line-input" data-field="ou-line" placeholder="—">
          <button class="pick-btn" data-field="ou-pick" data-value="OVER">Over</button>
          <button class="pick-btn" data-field="ou-pick" data-value="UNDER">Under</button>
        </div>
      </div>

      <div class="bet-row">
        <div class="bet-label">Handicap</div>
        <div class="bet-controls">
          <button class="pick-btn" data-field="hc-pick" data-value="OKC">Thunder</button>
          <input type="number" step="0.5" class="line-input" data-field="hc-line" placeholder="±">
          <button class="pick-btn" data-field="hc-pick" data-value="PHX">Suns</button>
        </div>
      </div>
    </div>
  </article>

  <div class="actions">
    <button class="reset-btn" id="resetBtn">Alle Picks zurücksetzen</button>
  </div>

  <div class="footer">
    Coach Jouley <span class="gold-dot">·</span> Predictions <span class="gold-dot">·</span> 2026
  </div>

</div>

<script>
const STORAGE_KEY = 'coachJouley_NBA_R1G2';

function loadPicks() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e) { return {}; }
}
function savePicks(p) { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }

let picks = loadPicks();

function applyState() {
  document.querySelectorAll('.game').forEach(game => {
    const gid = game.dataset.game;
    const data = picks[gid] || {};
    game.querySelectorAll('.team').forEach(t => {
      t.classList.toggle('selected', data.winner === t.dataset.team);
    });
    game.querySelectorAll('.line-input').forEach(inp => {
      const f = inp.dataset.field;
      inp.value = data[f] ?? '';
    });
    game.querySelectorAll('.pick-btn').forEach(btn => {
      const f = btn.dataset.field;
      btn.classList.toggle('active', data[f] === btn.dataset.value);
    });
  });
}

document.querySelectorAll('.team').forEach(t => {
  t.addEventListener('click', () => {
    const game = t.closest('.game');
    const gid = game.dataset.game;
    if (!picks[gid]) picks[gid] = {};
    picks[gid].winner = picks[gid].winner === t.dataset.team ? null : t.dataset.team;
    savePicks(picks); applyState();
  });
});

document.querySelectorAll('.pick-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const game = btn.closest('.game');
    const gid = game.dataset.game;
    const f = btn.dataset.field;
    if (!picks[gid]) picks[gid] = {};
    picks[gid][f] = picks[gid][f] === btn.dataset.value ? null : btn.dataset.value;
    savePicks(picks); applyState();
  });
});

document.querySelectorAll('.line-input').forEach(inp => {
  inp.addEventListener('input', () => {
    const game = inp.closest('.game');
    const gid = game.dataset.game;
    const f = inp.dataset.field;
    if (!picks[gid]) picks[gid] = {};
    picks[gid][f] = inp.value;
    savePicks(picks);
  });
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Wirklich alle Picks zurücksetzen?')) {
    picks = {};
    localStorage.removeItem(STORAGE_KEY);
    applyState();
  }
});

applyState();
</script>
</body>
</html>
